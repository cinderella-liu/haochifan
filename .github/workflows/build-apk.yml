name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get update -qq && sudo apt-get install -y -qq expect

      - name: Generate signing keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/android.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias android \
            -storepass android \
            -keypass android \
            -dname "CN=HaoChiFan,O=Personal,C=CN"

      - name: Create TWA manifest
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          PAGES_URL="https://${OWNER}.github.io/${REPO}"
          RAW_URL="https://raw.githubusercontent.com/${OWNER}/${REPO}/main"

          echo "PAGES_URL=${PAGES_URL}"
          echo "RAW_URL=${RAW_URL}"

          # Verify PWA manifest is accessible
          echo "=== Checking PWA manifest ==="
          curl -sI "${PAGES_URL}/manifest.json" | head -5
          echo "=== Checking raw manifest ==="
          curl -sI "${RAW_URL}/manifest.json" | head -5

          cat > twa-manifest.json <<MANIFEST
          {
            "packageId": "com.haochifan.twa",
            "host": "${OWNER}.github.io",
            "name": "好好吃饭",
            "launcherName": "好好吃饭",
            "themeColor": "#161929",
            "navigationColor": "#161929",
            "backgroundColor": "#161929",
            "enableNotifications": false,
            "startUrl": "/${REPO}/",
            "iconUrl": "${RAW_URL}/icon-512.png",
            "maskableIconUrl": "${RAW_URL}/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore/android.jks",
              "alias": "android",
              "password": "android"
            },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${RAW_URL}/manifest.json",
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${PAGES_URL}/",
            "minSdkVersion": 21
          }
          MANIFEST
          echo "=== TWA Manifest ==="
          cat twa-manifest.json

      - name: Init TWA project
        run: |
          expect -c '
          set timeout 600
          log_user 1
          spawn bubblewrap init --manifest twa-manifest.json
          expect {
              -re {\(Y/n\)} { send "y\r"; exp_continue }
              -re {\(y/n\)} { send "y\r"; exp_continue }
              -re {\(y/N\)} { send "y\r"; exp_continue }
              -re {\(Y/N\)} { send "y\r"; exp_continue }
              -re "(?i)confirm" { send "y\r"; exp_continue }
              eof
          }
          '

      - name: Build TWA APK
        run: |
          expect -c '
          set timeout 1200
          log_user 1
          spawn bubblewrap build
          expect {
              -re {\(Y/n\)} { send "y\r"; exp_continue }
              -re {\(y/n\)} { send "y\r"; exp_continue }
              -re {\(y/N\)} { send "y\r"; exp_continue }
              -re {\(Y/N\)} { send "y\r"; exp_continue }
              -re "Accept\\?" { send "y\r"; exp_continue }
              -re "(?i)Key Store:" { send "android\r"; exp_continue }
              -re "(?i)Key:" { send "android\r"; exp_continue }
              -re "(?i)confirm" { send "y\r"; exp_continue }
              eof
          }
          '

      - name: Collect APK files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f -ls
          mkdir -p output
          find . -name "*.apk" -type f -exec cp {} output/ \;
          ls -la output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: haochifan-apk
          path: output/*.apk
          if-no-files-found: error
