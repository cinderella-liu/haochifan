name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate signing keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/android.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias android \
            -storepass android \
            -keypass android \
            -dname "CN=HaoChiFan,O=Personal,C=CN"

      - name: Create TWA manifest
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          PAGES_URL="https://${OWNER}.github.io/${REPO}"

          cat > twa-manifest.json <<MANIFEST
          {
            "packageId": "com.haochifan.twa",
            "host": "${OWNER}.github.io",
            "name": "好好吃饭",
            "launcherName": "好好吃饭",
            "themeColor": "#161929",
            "navigationColor": "#161929",
            "backgroundColor": "#161929",
            "enableNotifications": false,
            "startUrl": "/${REPO}/",
            "iconUrl": "${PAGES_URL}/icon-512.png",
            "maskableIconUrl": "${PAGES_URL}/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore/android.jks",
              "alias": "android"
            },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${PAGES_URL}/manifest.json",
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${PAGES_URL}/",
            "minSdkVersion": 21
          }
          MANIFEST
          echo "=== TWA Manifest created ==="
          cat twa-manifest.json

      - name: Init TWA project
        run: |
          expect << 'EXPECT_EOF'
          set timeout 300
          log_user 1
          spawn bubblewrap init --manifest twa-manifest.json
          expect {
              -re "(?i)install the JDK" { send "N\r"; exp_continue }
              -re "(?i)\\(y/n\\)" { send "y\r"; exp_continue }
              -re "(?i)confirm" { send "y\r"; exp_continue }
              eof
          }
          EXPECT_EOF

      - name: Build TWA APK
        run: |
          expect << 'EXPECT_EOF'
          set timeout 600
          log_user 1
          spawn bubblewrap build
          expect {
              -re "(?i)install the JDK" { send "N\r"; exp_continue }
              -re "(?i)keystore password" { send "android\r"; exp_continue }
              -re "(?i)key password" { send "android\r"; exp_continue }
              -re "(?i)password" { send "android\r"; exp_continue }
              -re "(?i)\\(y/n\\)" { send "y\r"; exp_continue }
              -re "(?i)confirm" { send "y\r"; exp_continue }
              eof
          }
          EXPECT_EOF

      - name: Collect APK files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f -ls
          mkdir -p output
          find . -name "*.apk" -type f -exec cp {} output/ \;
          ls -la output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: haochifan-apk
          path: output/*.apk
          if-no-files-found: error
